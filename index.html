<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JustMeGaaRa - Personal Portfolio">
    <title>JustMeGaaRa</title>
    <!-- Outfit font for a more professional, smooth look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- The cursor light effect element -->

    <div id="cursor-container">
        <div id="cursor-glow"></div>
        <div id="cursor-dot"></div>
    </div>

    <div class="main-container">
        <h1>JustMeGaaRa</h1>

        <div class="links-container">
            <a href="https://github.com/JustMeGaaRa" target="_blank" class="social-link" title="GitHub">
                <i data-lucide="github"></i>
                <span class="link-label">GitHub</span>
            </a>
            <a href="https://www.linkedin.com/in/pavlohodysh/" target="_blank" class="social-link" title="LinkedIn">
                <i data-lucide="linkedin"></i>
                <span class="link-label">LinkedIn</span>
            </a>
            <a href="https://t.me/JustMeGaaRa" target="_blank" class="social-link" title="Telegram">
                <i data-lucide="send"></i>
                <span class="link-label">Telegram</span>
            </a>
        </div>
    </div>
    <!-- 16-bit Cartoon Bug -->
    <div id="bug-container">
        <svg id="pixel-bug" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <!-- Body Base (common) -->
            <rect x="3" y="3" width="10" height="10" rx="2" fill="#8a0b12" />
            <rect x="4" y="4" width="8" height="8" rx="2" fill="#d1121c" />
            
            <g id="side-view">
                <!-- Trail -->
                <rect x="1" y="9" width="3" height="2" fill="#8a0b12" />
                <rect x="0" y="10" width="1" height="1" fill="#d1121c" />
                <!-- Antenna -->
                <rect x="9" y="1" width="1" height="3" fill="#111" />
                <!-- Legs -->
                <rect class="leg1" x="5" y="13" width="2" height="2" fill="#111" />
                <rect class="leg2" x="9" y="13" width="2" height="2" fill="#111" />
                <!-- Highlight -->
                <rect x="5" y="5" width="2" height="2" fill="#ff4d55" />
                <!-- Eyes -->
                <rect x="8" y="5" width="4" height="4" fill="#ffffff" />
                <rect x="10" y="6" width="2" height="2" fill="#000000" />
                <!-- Mouth/Teeth -->
                <rect x="10" y="10" width="3" height="1" fill="#000000" />
                <rect x="10" y="10" width="1" height="1" fill="#ffffff" />
                <rect x="12" y="10" width="1" height="1" fill="#ffffff" />
            </g>
        
            <g id="front-view" style="display: none;">
                <!-- Antennae -->
                <rect x="4" y="1" width="1" height="3" fill="#111" />
                <rect x="11" y="1" width="1" height="3" fill="#111" />
                <!-- Legs -->
                <rect x="5" y="13" width="2" height="2" fill="#111" />
                <rect x="9" y="13" width="2" height="2" fill="#111" />
                <!-- Eyes front -->
                <rect x="4" y="6" width="3" height="3" fill="#ffffff" />
                <rect x="5" y="7" width="1" height="1" fill="#000000" />
                <rect x="9" y="6" width="3" height="3" fill="#ffffff" />
                <rect x="10" y="7" width="1" height="1" fill="#000000" />
                <!-- Mouth front -->
                <rect x="6" y="11" width="4" height="1" fill="#000000" />
                <rect x="6" y="11" width="1" height="1" fill="#ffffff" />
                <rect x="9" y="11" width="1" height="1" fill="#ffffff" />
            </g>
        </svg>
    </div>

    <script src="script.js"></script>
</body>

</html>
